name: Build VibeMusic APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Generate release keystore (self-signed, for sideload only)
        run: |
          keytool -genkeypair \
            -keystore app/vibemusic-release.keystore \
            -alias vibemusic \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass vibemusic -keypass vibemusic \
            -dname "CN=VibeMusic, OU=VibeMusic, O=VibeMusic, L=Anywhere, ST=Anywhere, C=US"

      - name: Make gradlew executable
        run: |
          [ -f gradlew ] && chmod +x gradlew || true

      - name: Build debug APK
        run: |
          if [ -f gradlew ]; then
            ./gradlew --no-daemon -x lint assembleDebug
          else
            gradle --no-daemon -x lint assembleDebug
          fi

      - name: Build release APK
        run: |
          if [ -f gradlew ]; then
            ./gradlew --no-daemon -x lint assembleRelease
          else
            gradle --no-daemon -x lint assembleRelease
          fi

      - name: Locate APKs
        id: locate
        run: |
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "debug_apk=$DEBUG_APK" >> $GITHUB_OUTPUT
          echo "release_apk=$RELEASE_APK" >> $GITHUB_OUTPUT
          echo "Built debug:   $DEBUG_APK ($(du -h "$DEBUG_APK" | cut -f1))"
          echo "Built release: $RELEASE_APK ($(du -h "$RELEASE_APK" | cut -f1))"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VibeMusic-debug
          path: ${{ steps.locate.outputs.debug_apk }}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: VibeMusic-release
          path: ${{ steps.locate.outputs.release_apk }}

      - name: Publish release on tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.locate.outputs.debug_apk }}
            ${{ steps.locate.outputs.release_apk }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
