name: Build VibeMusic APK

on:
workflow_dispatch:
push:
branches:
- main
- master

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 17
      cache: gradle

  - name: Verify Gradle Wrapper
    run: |
      ls -la
      test -f gradlew || (echo "gradlew missing" && exit 1)
      chmod +x gradlew

  - name: Show Wrapper Version
    run: |
      ./gradlew --version

  - name: Build Debug APK
    run: |
      ./gradlew clean assembleDebug --stacktrace --warning-mode all

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: VibeMusic-debug
      path: app/build/outputs/apk/debug/*.apk
```
