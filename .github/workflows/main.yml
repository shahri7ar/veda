name: Build VibeMusic APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # 👇 حذف کامل ارجاع‌های آیکون از مانیفست و ویجت
      - name: Remove launcher icon references from XML files
        run: |
          # حذف از AndroidManifest.xml
          sed -i 's/android:icon="[^"]*"//g' app/src/main/AndroidManifest.xml
          sed -i 's/android:roundIcon="[^"]*"//g' app/src/main/AndroidManifest.xml
          
          # حذف از فایل widget (اگر وجود داشته باشد)
          if [ -f app/src/main/res/xml/music_widget_info.xml ]; then
            sed -i 's/android:icon="[^"]*"//g' app/src/main/res/xml/music_widget_info.xml
          fi
          
          echo "✅ Icon references removed."

      - name: Generate Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Generate release keystore
        run: |
          keytool -genkeypair \
            -keystore app/vibemusic-release.keystore \
            -alias vibemusic \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass vibemusic -keypass vibemusic \
            -dname "CN=VibeMusic, OU=VibeMusic, O=VibeMusic, L=Anywhere, ST=Anywhere, C=US"

      - name: Build Debug APK
        run: ./gradlew --no-daemon -x lint assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew --no-daemon -x lint assembleRelease --stacktrace

      - name: Locate APKs
        id: locate
        run: |
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "debug_apk=$DEBUG_APK" >> $GITHUB_OUTPUT
          echo "release_apk=$RELEASE_APK" >> $GITHUB_OUTPUT

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VibeMusic-debug
          path: ${{ steps.locate.outputs.debug_apk }}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: VibeMusic-release
          path: ${{ steps.locate.outputs.release_apk }}
